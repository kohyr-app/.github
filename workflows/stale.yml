name: Mark stale issues and PRs

on:
  schedule:
    - cron: '0 0 * * 0'
  workflow_dispatch:

jobs:
  stale:
    runs-on: ubuntu-latest
    permissions:
      issues: write
      pull-requests: write
    steps:
      - uses: actions/stale@v9
        with:
          stale-issue-message: 'This issue has been inactive for 60 days. It will be closed in 7 days unless there is new activity.'
          stale-pr-message: 'This PR has been inactive for 30 days. Please rebase or close.'
          close-issue-message: 'Closing due to inactivity. Reopen if still relevant.'
          close-pr-message: 'Closing due to inactivity. Reopen when ready to continue.'
          days-before-issue-stale: 60
          days-before-pr-stale: 30
          days-before-close: 7
          exempt-issue-labels: 'pinned,security,roadmap'
          exempt-pr-labels: 'pinned,security'
